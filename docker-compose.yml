version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3030}:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production        # ← เปลี่ยนจาก development
      - NEXT_PUBLIC_APP_URL=https://dept.codingholiday.com
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
    command: npm start             # ← เปลี่ยนจาก npm run dev
    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge
