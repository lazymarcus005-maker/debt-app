apiVersion: v1
kind: Service
metadata:
  name: finance-app-service
  namespace: default
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 3030
---
apiVersion: v1
kind: Endpoints
metadata:
  name: finance-app-service
  namespace: default
subsets:
  - addresses:
      - ip: 144.126.140.118
    ports:
      - name: http
        port: 3030
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-app-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: debt.codingholiday.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finance-app-service
                port:
                  number: 80