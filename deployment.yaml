apiVersion: v1
kind: Service
metadata:
  name: finance-app-service
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 3030
  # ไม่มี selector เพราะ backend ไม่ได้เป็น pod ใน k8s
---
apiVersion: v1
kind: Endpoints
metadata:
  name: finance-app-service
subsets:
  - addresses:
      # IP ของ VM/Node ที่ docker compose bind port 3000 ไว้
      - ip: 144.126.140.118
    ports:
      - name: http
        port: 3030
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-app-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    - host: debt.codingholiday.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finance-app-service
                port:
                  number: 80